# Static checks only — no Azure subscription, no `az login`, no VM SSH keys, no `terraform apply`.
#
# - Terraform: `validate` evaluates locals; `ssh_public_key` defaults empty and would read
#   ~/.ssh/homelab_azure.pub on a laptop. Runners do not have that file, so we inject
#   TF_VAR_ssh_public_key (valid placeholder material; never used for a real apply here).
#
# - Ansible: `ansible-playbook --syntax-check` parses YAML only; it does not run tasks,
#   so `keyvault_secrets` never calls `az` and no Key Vault or VM credentials are required.
#
# To add later: a separate job with `azure/login` (OIDC or client secret) + `ansible-playbook
# --check` or Molecule — keep secrets in GitHub Actions encrypted secrets / OIDC only.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VAR_ssh_public_key: >-
    ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGMVdMap2M8Jy8EjCnHqzNBCEU8xyFGW9LLHj9AgMrgW
    github-actions-ci-placeholder

jobs:
  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform format (check only)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  ansible:
    name: Ansible syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and collections
        run: |
          pip install --user "ansible-core>=2.14"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          cd ansible && ansible-galaxy collection install -r requirements.yml

      - name: Syntax check deploy-homelab
        working-directory: ansible
        run: ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i ../.github/inventory-syntax.ini playbooks/deploy-homelab.yml --syntax-check
