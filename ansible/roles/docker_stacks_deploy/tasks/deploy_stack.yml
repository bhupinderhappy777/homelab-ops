- name: Remove stale {{ homelab_stack.compose_network_name }} network if labels do not match
  ansible.builtin.shell: |
    set -euo pipefail
    if ! docker network inspect {{ homelab_stack.compose_network_name }} >/dev/null 2>&1; then
      exit 0
    fi

    compose_label="$(docker network inspect {{ homelab_stack.compose_network_name }} --format '{{"{{"}} index .Labels "com.docker.compose.network" {{"}}"}}')"
    if [ "${compose_label}" != "{{ homelab_stack.compose_network_label }}" ]; then
      docker network rm {{ homelab_stack.compose_network_name }}
    fi
  args:
    executable: /bin/bash
  # Intentionally not "changed" when a stale network is removed — avoids noisy plays; use -v to see shell output.
  changed_when: false

- name: Deploy {{ homelab_stack.name }} stack
  ansible.builtin.command:
    cmd: "{{ homelab_compose_cmd }} --env-file /opt/homelab/homelab_ops/docker/.env up -d --remove-orphans"
    chdir: "/opt/homelab/homelab_ops/docker/stacks/{{ homelab_stack.name }}"
  register: compose_output
  # Compose v2 often writes progress to stderr; include both streams so first deploy shows changed.
  changed_when: >-
    (
      compose_output.stdout | default('')
      ~ compose_output.stderr | default('')
    ) is search('(?i)(creating|recreating|starting|started|created|pulled|pulling|downloaded|removing|removed)')
