---
- name: Chezmoi | Ensure zsh is installed and default shell for user
  ansible.builtin.package:
    name: zsh
    state: present
  become: true

- name: Chezmoi | Set user shell to zsh
  ansible.builtin.user:
    name: "{{ chezmoi_user }}"
    shell: /usr/bin/zsh
  become: true

- name: Chezmoi | Check status of existing config files
  ansible.builtin.stat:
    path: "{{ chezmoi_home }}/{{ item }}"
  register: chezmoi_config_stats
  loop:
    - ".zshrc"
    - ".gitconfig"
    - ".local/share/konsole/my_profile.profile"
    - ".config/kwinrc"
    - ".config/kglobalshortcutsrc"
    - ".config/kscreenlockerrc"
    - ".config/kdeglobals"
    - ".config/kwalletrc"
    - ".config/konsolerc"
    - ".config/audacity/audacity.cfg"
    - ".config/doublecmd/doublecmd.xml"
    - ".config/doublecmd/shortcuts.scf"
    - ".config/doublecmd/colors.json"
    - ".config/doublecmd/multiarc.ini"
    - ".var/app/com.visualstudio.code/config/Code/User/settings.json"
    - ".var/app/com.visualstudio.code/config/Code/User/argv.json"
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Purge real files to allow for managed config
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  when:
    - item.stat.exists
    - not item.stat.isdir
    - not item.stat.islnk
  loop: "{{ chezmoi_config_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Ensure VS Code config directory exists
  ansible.builtin.file:
    path: "{{ chezmoi_home }}/.var/app/com.visualstudio.code/config/Code/User"
    state: directory
    mode: "0755"
  tags: [chezmoi, gui]

- name: Chezmoi | Check if binary exists in local bin
  ansible.builtin.stat:
    path: "{{ chezmoi_home }}/.local/bin/chezmoi"
  register: chezmoi_binary_stat
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Ensure user-local bin directory exists
  ansible.builtin.file:
    path: "{{ chezmoi_home }}/.local/bin"
    state: directory
    mode: "0755"
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Install via script to user-local bin
  ansible.builtin.shell:
    cmd: "set -o pipefail && curl -sfL https://get.chezmoi.io | sh -s -- -b {{ chezmoi_home }}/.local/bin"
    executable: /bin/bash
    creates: "{{ chezmoi_home }}/.local/bin/chezmoi"
  when:
    - chezmoi_install_package | default(true)
    - not chezmoi_binary_stat.stat.exists
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Set command path fact
  ansible.builtin.set_fact:
    chezmoi_cmd: "{{ chezmoi_home }}/.local/bin/chezmoi"
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Ensure dotfiles repository is configured
  ansible.builtin.assert:
    that:
      - chezmoi_repo | length > 0
    fail_msg: "Set clone_dotfiles_repo or chezmoi_repo before running the chezmoi role"
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Check if initialized
  ansible.builtin.stat:
    path: "{{ chezmoi_source_path }}/.git"
  register: chezmoi_initialized
  tags: [chezmoi, cli, gui]

- name: Debug SSH Agent
  ansible.builtin.shell: "echo $SSH_AUTH_SOCK && ssh-add -l"
  register: ssh_debug
  ignore_errors: yes
  changed_when: false

- name: Chezmoi | Initialize source from repository
  ansible.builtin.shell: >-
    {{ chezmoi_cmd }} init
    --no-tty
    {{ '--force' if (chezmoi_force_apply or chezmoi_force_source_init) else '' }}
    {% if chezmoi_exclude is defined and chezmoi_exclude | length > 0 %}
    --exclude {{ chezmoi_exclude | join(',') }}
    {% endif %}
    --branch {{ chezmoi_branch }}
    --destination {{ chezmoi_home }}
    --source {{ chezmoi_source_path }}
    {{ chezmoi_repo }}
  environment:
    SSH_AUTH_SOCK: "{{ ssh_debug.stdout_lines[0] }}"
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
  when: (not chezmoi_initialized.stat.exists) or chezmoi_force_source_init
  register: chezmoi_init
  changed_when: chezmoi_init.rc == 0
  become: false
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Update source state
  ansible.builtin.shell: >-
    {{ chezmoi_cmd }} update
    --no-tty
    {{ '--force' if chezmoi_force_apply else '' }}
    {% if chezmoi_exclude is defined and chezmoi_exclude | length > 0 %}
    --exclude {{ chezmoi_exclude | join(',') }}
    {% endif %}
    --destination {{ chezmoi_home }}
    --source {{ chezmoi_source_path }}
  environment:
    SSH_AUTH_SOCK: "{{ ssh_debug.stdout_lines[0] }}"
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
  when: chezmoi_initialized.stat.exists and not chezmoi_force_source_init
  register: chezmoi_update
  changed_when: chezmoi_update.rc == 0 and "Already up to date" not in chezmoi_update.stdout
  become: false
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Check pending changes
  ansible.builtin.command:
    cmd: >-
      {{ chezmoi_cmd }} status
      --no-tty
      --destination {{ chezmoi_home }}
      --source {{ chezmoi_source_path }}
  register: chezmoi_status
  changed_when: false
  become: false
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Fix ownership for systemd user units
  ansible.builtin.file:
    path: "{{ chezmoi_home }}/.config/systemd/user/{{ item }}"
    owner: "{{ chezmoi_user }}"
    group: "{{ chezmoi_user }}"
  loop:
    - wallpaper-refresh.service
    - wallpaper-refresh.timer
    - inbox-watcher.service
    - plasma-harvest.service
    - plasma-harvest.path
  become: true
  when: chezmoi_fix_systemd_ownership | bool
  ignore_errors: true
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Apply dotfiles
  ansible.builtin.shell: >-
    {{ chezmoi_cmd }} apply
    --no-tty
    {{ '--force' if chezmoi_force_apply else '' }}
    {% if chezmoi_exclude is defined and chezmoi_exclude | length > 0 %}
    --exclude {{ chezmoi_exclude | join(',') }}
    {% endif %}
    --destination {{ chezmoi_home }}
    --source {{ chezmoi_source_path }}
  when: chezmoi_status.stdout | trim != ''
  register: chezmoi_apply
  changed_when: chezmoi_apply.rc == 0
  become: false
  tags: [chezmoi, cli, gui]

- name: Chezmoi | Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: false
  tags: [chezmoi, systemd]

- name: Chezmoi | Enable user services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    scope: user
  loop:
    - wallpaper-refresh.timer
    - inbox-watcher.service
  become: false
  failed_when: false
  tags: [chezmoi, systemd]