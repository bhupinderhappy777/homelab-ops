---
- name: Windows - enforce password and lockout policy
  ansible.windows.win_security_policy:
    section: System Access
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - { key: "PasswordComplexity", value: 1 }
    - { key: "MinimumPasswordLength", value: 14 }
    - { key: "MaximumPasswordAge", value: 60 }
    - { key: "PasswordHistorySize", value: 24 }
    - { key: "LockoutBadCount", value: 5 }
    - { key: "ResetLockoutCount", value: 30 }
    - { key: "LockoutDuration", value: 30 }
  when: not (security_hardening_verify_only | default(false))
  tags:
    - security
    - security:auth
    - security:windows

- name: Windows - require NLA for RDP (if RDP enabled)
  ansible.windows.win_regedit:
    path: HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp
    name: UserAuthentication
    data: 1
    type: dword
  when:
    - security_hardening_windows_rdp_enabled | default(false)
    - not (security_hardening_verify_only | default(false))
  tags:
    - security
    - security:auth
    - security:windows
    - security:rdp
