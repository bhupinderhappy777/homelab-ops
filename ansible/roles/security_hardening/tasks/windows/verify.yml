---
- name: Windows - verify firewall is enabled
  ansible.windows.win_shell: |
    netsh advfirewall show allprofiles state
  register: security_hardening_win_fw_state
  changed_when: false
  tags:
    - security
    - security:verify
    - security:windows

- name: Windows - assert firewall enabled on all profiles
  ansible.builtin.assert:
    that:
      - "'ON' in security_hardening_win_fw_state.stdout"
    fail_msg: >-
      Windows Firewall not enabled on all profiles on {{ inventory_hostname }}
  tags:
    - security
    - security:verify
    - security:windows

- name: Windows - verify RDP state (TermService)
  ansible.windows.win_service_info:
    name: TermService
  register: security_hardening_rdp_service
  changed_when: false
  tags:
    - security
    - security:verify
    - security:windows
    - security:rdp

- name: Windows - assert RDP disabled when not allowed
  ansible.builtin.assert:
    that:
      - >-
        (security_hardening_windows_rdp_enabled | default(false)) or
        (security_hardening_rdp_service.exists and
         security_hardening_rdp_service.state != 'running')
    fail_msg: >-
      RDP service should be disabled by hardening but is running on
      {{ inventory_hostname }}
  tags:
    - security
    - security:verify
    - security:windows
    - security:rdp
