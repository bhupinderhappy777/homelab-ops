---
- name: Windows - enable security audit policies (core categories)
  ansible.windows.win_audit_policy_system:
    category: "{{ item }}"
    audit_type: success,failure
  loop:
    - Logon
    - Account Logon
    - Account Management
    - Policy Change
    - Privilege Use
    - System
  when: not (security_hardening_verify_only | default(false))
  tags:
    - security
    - security:audit
    - security:windows
