---
- name: Assert supported OS for security hardening
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] is defined
      - ansible_facts['os_family'] in ['RedHat', 'Debian']
    fail_msg: >-
      Unsupported OS family {{ ansible_facts['os_family'] | default('unset') }}
      for security_hardening (Linux only: RedHat or Debian family).
  tags:
    - always
    - security
    - security:os_check

- name: Include Linux security hardening
  ansible.builtin.include_tasks: linux/main.yml
  when: ansible_facts['os_family'] in ['RedHat', 'Debian']
  tags:
    - security
    - security:linux
