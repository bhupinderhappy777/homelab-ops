---
- name: Linux - ensure auditd present (where available)
  ansible.builtin.package:
    name: "{{ 'auditd' if ansible_facts['os_family'] == 'Debian' else 'audit' }}"
    state: present
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Debian']
    - security_hardening_enable_auditd | default(true)
    - not (security_hardening_verify_only | default(false))
  tags:
    - security
    - security:audit
