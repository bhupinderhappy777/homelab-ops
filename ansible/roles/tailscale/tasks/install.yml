---
- name: Install Tailscale | Assert Debian-family target
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
    fail_msg: "tailscale role supports Debian/Ubuntu only in this repository."

- name: Install Tailscale | Debian/Ubuntu
  become: true
  block:
    - name: Install Tailscale | Add GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Install Tailscale | Add repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
          https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}
          {{ ansible_facts['distribution_release'] }} main
        state: present
        filename: tailscale

    - name: Install Tailscale | Package
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: yes

    - name: Ensure Tailscale service is started and enabled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
      register: tailscale_tailscaled_service
      failed_when:
        - tailscale_tailscaled_service.failed
        - "'not found' not in tailscale_tailscaled_service.msg"
        - "'molecule' not in group_names"
