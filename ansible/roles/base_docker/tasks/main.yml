---
# Install Docker Engine (Ubuntu/Debian), OCI Object Storage CLI dependencies, and sysctls

- name: Assert Debian-family OS for Docker install
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
    fail_msg: >-
      base_docker supports Debian/Ubuntu only (this homelab targets Ubuntu Server).

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - python3-pip
      - restic
      - unzip
    state: present
    update_cache: yes

- name: Install Debian-family package helpers
  ansible.builtin.apt:
    name:
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Ensure Docker keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
    keyring: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker

- name: Install Docker CE and plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ admin_username | default('deployuser') }}"
    groups: docker
    append: yes

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Set vm.max_map_count for Elasticsearch (Immich)
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    sysctl_set: yes
    reload: yes
