---
- name: Check whether migration restore archive exists
  ansible.builtin.stat:
    path: "{{ migration_restore_archive_dir }}"
  register: migration_restore_archive
  when: migration_restore_archive_dir | length > 0

- name: Fail when requested migration archive is missing
  ansible.builtin.fail:
    msg: "Migration restore archive directory not found: {{ migration_restore_archive_dir }}"
  when:
    - migration_restore_archive_dir | length > 0
    - not migration_restore_archive.stat.exists

- name: Ensure migration import script is executable
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../docker/scripts/migration-import.sh"
    dest: /opt/homelab/docker_stacks/docker/scripts/migration-import.sh
    mode: '0755'
  when: migration_restore_archive_dir | length > 0

- name: Restore migrated homelab data
  ansible.builtin.command:
    cmd: /opt/homelab/docker_stacks/docker/scripts/migration-import.sh {{ migration_restore_archive_dir }}
  environment:
    CONTAINER_RUNTIME: "{{ homelab_container_runtime | default('docker') }}"
  when: migration_restore_archive_dir | length > 0

- name: Restart stacks after migration restore
  ansible.builtin.command:
    cmd: "{{ 'podman-compose' if (homelab_container_runtime | default('docker') | lower) == 'podman' else 'docker compose' }} --env-file /opt/homelab/docker_stacks/docker/.env up -d --remove-orphans"
    chdir: "/opt/homelab/docker_stacks/docker/stacks/{{ item }}"
  loop: "{{ migration_restore_stacks }}"
  when: migration_restore_archive_dir | length > 0
