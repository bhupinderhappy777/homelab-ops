# Prometheus configuration — unified monitoring stack
# Merges former prometheus/prometheus.yml with new infrastructure targets.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'docker-compose'
    environment: 'production'

scrape_configs:
  # --- infrastructure targets (monitoring stack internals) ---

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: '/metrics'

  # --- application targets (carried over from prometheus/prometheus.yml) ---
