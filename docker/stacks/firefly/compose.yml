version: '3.8'

# --- 2. SERVICES SECTION ---
services:
  ## FIREFLY III CORE APPLICATION (app) ##
  app:
    image: docker.io/fireflyiii/core:latest
    hostname: app
    networks:
    - firefly_iii
    volumes:
    - /opt/homelab/data/firefly_iii/firefly_iii_upload:/var/www/html/storage/upload
    environment:
      APP_ENV: 'production'
      APP_DEBUG: 'false'
      APP_KEY: '${FIREFLY_APP_KEY}' # ❗ REPLACE with your actual, unique key
      TZ: 'America/Vancouver'
      TRUSTED_PROXIES: '**'
      DB_CONNECTION: 'mysql'
      DB_HOST: 'db'
      DB_PORT: '3306'
      DB_DATABASE: 'firefly'
      DB_USERNAME: 'firefly'
      DB_PASSWORD: '${FIREFLY_DB_PASSWORD}' # ❗ REPLACE with your actual DB password

      SITE_OWNER: 'you@example.com'
      STATIC_CRON_TOKEN: '${FIREFLY_CRON_TOKEN}' # ❗ REPLACE with your actual token
      APP_URL: '${FIREFLY_APP_URL}'
      FIREFLY_III_URL: 'http://app:8080'
      CACHE_DRIVER: 'file'
      SESSION_DRIVER: 'file'
    ports:
    - "82:8080"

    # FIXED: Switched to wget for better Alpine compatibility
    healthcheck:
      # This checks if the Nginx PID file exists, which is proof it started.
      # It avoids network/curl issues entirely.
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  db:
    image: docker.io/library/mariadb:lts
    hostname: db
    networks:
    - firefly_iii
    volumes:
    - /opt/homelab/data/firefly_iii/firefly_iii_db:/var/lib/mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
      MYSQL_USER: 'firefly'
      MYSQL_PASSWORD: '${FIREFLY_DB_PASSWORD}' # ❗ REPLACE
      MYSQL_DATABASE: 'firefly'

    # FIXED: Updated healthcheck for MariaDB 11.x
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  importer:
    image: docker.io/fireflyiii/data-importer:version-1.5.5
    hostname: importer
    networks:
    - firefly_iii

    ports:
    - "81:8080"

    environment:
      FIREFLY_III_URL: 'http://app:8080'

    volumes:
    - /opt/homelab/data/firefly_iii/firefly_iii_importer:/var/www/html/storage/upload
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/apache2/apache2.pid || test -f /var/run/apache2.pid"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  cron:
    image: docker.io/library/alpine:3.19

    environment:
      TZ: 'America/Vancouver'
      STATIC_CRON_TOKEN: '${FIREFLY_CRON_TOKEN}' # ❗ REPLACE
    command: >
      sh -c "apk add --no-cache tzdata wget &&
      (ln -fs /usr/share/zoneinfo/$$TZ /etc/localtime || true) &&
      echo '0 3 * * * wget -qO- http://app:8080/api/v1/cron/'$$STATIC_CRON_TOKEN';echo' | crontab - &&
      crond -f -L /dev/stdout"

    networks:
    - firefly_iii

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
networks:
  firefly_iii:
    driver: bridge
