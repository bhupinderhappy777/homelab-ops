version: '3.9'

# --- 1. VOLUMES SECTION ---
# Config is bind-mounted for persistence; cache is local for performance.
volumes:
  # Local volume for Jellyfin cache (transcoding cache for performance)
  jellyfin_cache:
    driver: local

# NOTE: Media volumes are bind mounts; media files are read-only content and don't
# have SQLite locking issues.

# --- 2. SERVICES SECTION ---
services:
  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    hostname: jellyfin

    # User is required to manage media file permissions
    user: '1002:1002'

    # Standard bridge networking.
    networks:
    - jellyfin_network

    ports:
      # Publish default Jellyfin HTTP port (8096)
    - "8096:8096"
      # NOTE: You may need to map additional ports (e.g., 8920 for HTTPS/other protocols)
    volumes:
      # Local volumes
    - /opt/homelab/data/jellyfin_data/config:/config
    - jellyfin_cache:/cache
    - /mnt/media_storage:/mnt/media:ro
    - /home/adminuser/media:/media:ro
    restart: 'unless-stopped'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jellyfin_network:
    driver: bridge
