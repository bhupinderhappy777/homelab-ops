version: '3.8'

# --- 1. VOLUMES SECTION ---
services:
  ## UPTIME KUMA MONITORING ##
  uptime-kuma:
    # 1.23.11 was never published on Docker Hub; pin v2 (see uptime-kuma/MONITORS.md).
    image: docker.io/louislam/uptime-kuma:2.2.1
    hostname: uptime-kuma

    ports:
    - "3002:3001"    # Avoid clash with Paperless AI on 3001; Grafana (when deployed) planned on 3005

    volumes:
    - /opt/homelab/data/uptime-kuma/data:/app/data
    environment:
      # Uptime Kuma doesn't require many environment variables
      # Configuration is done through the web UI
      TZ: 'America/Vancouver'  # Set your timezone
    networks:
    - homelab_network
    - uptime_kuma_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/app/extra/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  homelab_network:
    external: true
    name: homelab-network
  uptime_kuma_network:
    driver: bridge
