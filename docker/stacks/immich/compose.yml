version: '3.8'

volumes:
  model-cache:

networks:
  immich_network:
    driver: bridge

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    hostname: immich-server
    networks:
    - immich_network

    volumes:
    - /opt/homelab/data/immich/uploads:/usr/src/app/upload
    - /etc/localtime:/etc/localtime:ro
    ports:
    - "2283:2283"

    environment:
      DB_PASSWORD: '${IMMICH_DB_PASSWORD}'
      DB_USERNAME: 'postgres'
      DB_DATABASE_NAME: 'immich'
      DB_HOSTNAME: 'database'
      REDIS_HOSTNAME: 'redis'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    hostname: immich-machine-learning
    networks:
    - immich_network

    volumes:
    - model-cache:/cache
    environment:
      DB_PASSWORD: '${IMMICH_DB_PASSWORD}'
      DB_USERNAME: 'postgres'
      DB_DATABASE_NAME: 'immich'
      DB_HOSTNAME: 'database'
      REDIS_HOSTNAME: 'redis'

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped
  redis:
    image: 
      docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
    hostname: redis
    networks:
    - immich_network
    volumes:
    - /opt/homelab/data/immich/immich_redis:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    restart: unless-stopped
  database:
    image: 
      ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    hostname: database
    networks:
    - immich_network

    environment:
      POSTGRES_PASSWORD: '${IMMICH_DB_PASSWORD}'
      POSTGRES_USER: 'postgres'
      POSTGRES_DB: 'immich'
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
    - /opt/homelab/data/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
