# Torrent automation stack:
# - Transmission for downloads
# - FlareSolverr for anti-bot challenge solving
# - Prowlarr / Radarr / Sonarr for indexer and media automation
services:
  torrent-client:
    image: lscr.io/linuxserver/transmission:latest
    hostname: torrent-client
    networks:
    - homelab_network
    - torrent_client_network
    restart: unless-stopped

    ports:
    - "6882:6882"
    - "6882:6882/udp"
    - "9091:9091"

    environment:
      PUID: '1002'
      PGID: '1002'
      TZ: '${TZ}'
      USER: 'admin'
      PASS: '${TRANSMISSION_RPC_PASSWORD}'
      PEERPORT: '6882'

    volumes:
    - ${DATA_ROOT}/transmission:/config
    - /home/adminuser/media:/downloads

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9091/transmission/web/ >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    security_opt:
    - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    hostname: flaresolverr
    networks:
    - homelab_network
    restart: unless-stopped

    environment:
      LOG_LEVEL: info
      TZ: '${TZ}'

    ports:
    - "8191:8191"

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8191/ >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    security_opt:
    - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    hostname: prowlarr
    networks:
    - homelab_network
    restart: unless-stopped

    environment:
      PUID: '1002'
      PGID: '1002'
      TZ: '${TZ}'

    volumes:
    - ${DATA_ROOT}/prowlarr:/config

    ports:
    - "9696:9696"

    depends_on:
    - flaresolverr

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9696 >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    security_opt:
    - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    hostname: radarr
    networks:
    - homelab_network
    restart: unless-stopped

    environment:
      PUID: '1002'
      PGID: '1002'
      TZ: '${TZ}'

    volumes:
    - ${DATA_ROOT}/radarr:/config
    - /home/adminuser/media:/downloads

    ports:
    - "7878:7878"

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:7878 >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    security_opt:
    - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    hostname: sonarr
    networks:
    - homelab_network
    restart: unless-stopped

    environment:
      PUID: '1002'
      PGID: '1002'
      TZ: '${TZ}'

    volumes:
    - ${DATA_ROOT}/sonarr:/config
    - /home/adminuser/media:/downloads

    ports:
    - "8989:8989"

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8989 >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    security_opt:
    - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  homelab_network:
    external: true
    name: homelab-network
  torrent_client_network:
    driver: bridge
